name: Deploy to Netlify

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: deploy-prod
        run: |
          echo "🚀 Deploying to production..."
          DEPLOY_OUTPUT=$(npx netlify-cli deploy --prod --dir=dist --message "Deploy from GitHub Actions" --timeout=600 --json)
          DEPLOY_URL=$(echo $DEPLOY_OUTPUT | jq -r '.deploy_url // .url')
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Production deployed to: $DEPLOY_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}

      - name: Deploy to Netlify (Staging)
        if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
        id: deploy-staging
        run: |
          echo "🔄 Deploying to staging..."
          DEPLOY_OUTPUT=$(npx netlify-cli deploy --prod --dir=dist --message "Staging deploy from ${{ github.sha }}" --json)
          DEPLOY_URL=$(echo $DEPLOY_OUTPUT | jq -r '.deploy_url // .url')
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Staging deployed to: $DEPLOY_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_STAGING }}

      - name: Deploy to Netlify (Preview)
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: |
          echo "👀 Deploying preview for PR #${{ github.event.number }}..."
          DEPLOY_OUTPUT=$(npx netlify-cli deploy --dir=dist --message "Preview from PR #${{ github.event.number }}" --json)
          DEPLOY_URL=$(echo $DEPLOY_OUTPUT | jq -r '.deploy_url')
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Preview deployed to: $DEPLOY_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_STAGING }}

      - name: Create GitHub Deployment (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy-prod.outputs.deploy-url }}';

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: deploymentUrl,
              description: 'Production deployment successful'
            });

      - name: Create GitHub Deployment (Staging)
        if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy-staging.outputs.deploy-url }}';

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: deploymentUrl,
              description: 'Staging deployment successful'
            });

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deploy-preview.outputs.deploy-url }}';

            if (deployUrl && deployUrl !== 'null') {
              const comment = `## 🚀 Deploy Preview

              **Preview URL**: ${deployUrl}

              - ✅ Deploy successful
              - 📦 Built from commit: \`${context.sha.substring(0, 7)}\`
              - 🌿 Branch: \`${context.payload.pull_request.head.ref}\`

              ---
              *Preview will update automatically on new commits*`;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
